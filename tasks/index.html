2026-04-27__18-08-02\",\"trial_name\":\"amika_clean_room__foAT6z6\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":true,\"latency_sec\":655.952,\"latency_breakdown\":{\"env_setup\":5.171,\"agent_setup\":22.384,\"agent_exec\":600.115,\"verifier\":8.321},\"taskName\":\"amika_clean_room\",\"jobId\":\"foAT6z6\",\"exec_duration\":600.115}]},{\"taskName\":\"amika_config_toml\",\"instruction\":\"# Configure Amika Repository\\n\\n## Background\\nYou have a Node.js web project at `/home/user/myproject`. You need to create an Amika repository configuration file to define a setup script, environment variables, and a web service.\\n\\n## Requirements\\n- Create an `.amika/config.toml` file in the project root.\\n- Configure a setup script pointing to `scripts/setup.sh`.\\n- Add an environment variable `NODE_ENV` set to `\\\"development\\\"`.\\n- Define a service named `web` running on port 3000 with the `http` URL scheme.\\n- Set the sandbox preset to `\\\"coder\\\"`.\\n\\n## Constraints\\n- Project path: /home/user/myproject\\n\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_config_toml__ANnyBis\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":false,\"latency_sec\":117.356,\"latency_breakdown\":{\"env_setup\":13.437,\"agent_setup\":20.704,\"agent_exec\":63.909,\"verifier\":4.528},\"taskName\":\"amika_config_toml\",\"jobId\":\"ANnyBis\",\"exec_duration\":63.909}]},{\"taskName\":\"amika_credential_shadow\",\"instruction\":\"$8\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_credential_shadow__iSiK4zQ\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":true,\"reward\":1,\"error\":false,\"latency_sec\":117.835,\"latency_breakdown\":{\"env_setup\":13.296,\"agent_setup\":20.316,\"agent_exec\":63.947,\"verifier\":4.579},\"taskName\":\"amika_credential_shadow\",\"jobId\":\"iSiK4zQ\",\"exec_duration\":63.947}]},{\"taskName\":\"amika_git_workflow\",\"instruction\":\"$9\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_git_workflow__qQiGJNz\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":true,\"latency_sec\":663.747,\"latency_breakdown\":{\"env_setup\":13.665,\"agent_setup\":19.967,\"agent_exec\":600.676,\"verifier\":7.765},\"taskName\":\"amika_git_workflow\",\"jobId\":\"qQiGJNz\",\"exec_duration\":600.676}]},{\"taskName\":\"amika_materialize_logs\",\"instruction\":\"# Amika Materialize Logs\\n\\n## Background\\nAmika provides materialization for running ephemeral containers for batch tasks. You can run a command and copy the output back to the host using `amika materialize`.\\n\\n## Requirements\\n- You have a data processing script `process.sh` located at `/home/user/app/process.sh`.\\n- Run this script inside an ephemeral container using the `amika materialize` command.\\n- The script generates a log file at `/logs/output.log` inside the container.\\n- You must copy the `/logs` directory from the container back to the host at `/home/user/app/logs`.\\n\\n## Constraints\\n- Project path: /home/user/app\\n- Log file: /home/user/app/logs/output.log\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_materialize_logs__FYafZUU\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":true,\"latency_sec\":666.317,\"latency_breakdown\":{\"env_setup\":14.395,\"agent_setup\":19.777,\"agent_exec\":600.159,\"verifier\":4.741},\"taskName\":\"amika_materialize_logs\",\"jobId\":\"FYafZUU\",\"exec_duration\":600.159}]},{\"taskName\":\"amika_materialize_ls\",\"instruction\":\"# Materialize ls Output\\n\\n## Background\\nAmika provides ephemeral containers for batch tasks via the `materialize` command. You can run a command in an isolated environment and copy the output back to the host.\\n\\n## Requirements\\n- Execute the `ls -R` command in an ephemeral container using `amika materialize`.\\n- Copy the output directory from the container to the host at `/home/user/logs`.\\n\\n## Constraints\\n- Project path: /home/user/myproject\\n- Log directory: /home/user/logs\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_materialize_ls__FLx5L5o\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":true,\"latency_sec\":656.058,\"latency_breakdown\":{\"env_setup\":4.744,\"agent_setup\":25.133,\"agent_exec\":600.138,\"verifier\":4.769},\"taskName\":\"amika_materialize_ls\",\"jobId\":\"FLx5L5o\",\"exec_duration\":600.138}]},{\"taskName\":\"amika_materialize_transform\",\"instruction\":\"# Amika Materialize Data Transformation\\n\\n## Background\\nYou have the Amika CLI installed and authenticated. You need to use Amika's materialize feature to run a data transformation script in an ephemeral container and copy the results back to the host.\\n\\n## Requirements\\n- Create a Python script `transform.py` in `/home/user/project` that reads a JSON file `input.json` containing an array of numbers, squares each number, and writes the result to `output.json`.\\n- Create `input.json` with the content `[1, 2, 3, 4, 5]` in the same directory.\\n- Use `amika materialize` to execute `python transform.py` in an ephemeral container.\\n- Ensure the generated `output.json` is copied back to the host directory `/home/user/project/results`.\\n\\n## Constraints\\n- Project path: `/home/user/project`\\n- The script must run via `amika materialize`.\\n- The output must be saved to `/home/user/project/results/output.json` on the host.\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_materialize_transform__9WXSAWt\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":true,\"latency_sec\":663.239,\"latency_breakdown\":{\"env_setup\":13.294,\"agent_setup\":23.724,\"agent_exec\":600.121,\"verifier\":4.475},\"taskName\":\"amika_materialize_transform\",\"jobId\":\"9WXSAWt\",\"exec_duration\":600.121}]},{\"taskName\":\"amika_mcp_config\",\"instruction\":\"# Configure Mock MCP Server for Amika\\n\\n## Background\\nAmika sandboxes can inject MCP servers into the agent's environment (e.g., `~/.claude/.config.json`). You need to set up a mock MCP server locally and configure it so an agent inside the sandbox can discover it.\\n\\n## Requirements\\n1. Create a mock MCP server script at `/home/user/project/mock_mcp.py` that implements a simple tool (e.g., `get_mock_data` returning `{\\\"status\\\": \\\"ok\\\"}`).\\n2. Configure the Amika agent environment to use this MCP server by creating/updating the `~/.claude/.config.json` file to include the `mock-mcp` server pointing to the python script.\\n\\n## Constraints\\n- Project path: /home/user/project\\n- The mock MCP server must be executable via `python3 /home/user/project/mock_mcp.py`.\\n- The configuration must be in `~/.claude/.config.json`.\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_mcp_config__RT73EGy\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":true,\"reward\":1,\"error\":false,\"latency_sec\":163.806,\"latency_breakdown\":{\"env_setup\":18.498,\"agent_setup\":20.027,\"agent_exec\":106.767,\"verifier\":4.47},\"taskName\":\"amika_mcp_config\",\"jobId\":\"RT73EGy\",\"exec_duration\":106.767}]},{\"taskName\":\"amika_multiplayer_share\",\"instruction\":\"# Share Live Preview URL for Multiplayer Debugging\\n\\n## Background\\nYou have a local git repository at `/home/user/frontend-app` containing a simple frontend application (`index.html`). You want to create a remote sandbox to run this application and share the live preview URL with your teammates.\\n\\n## Requirements\\n- Create a remote sandbox named `multiplayer-box` from the git repository at `/home/user/frontend-app`.\\n- Configure the sandbox to expose port `8080` to the public internet.\\n- Start a simple HTTP server on port `8080` serving the `index.html` file in the background inside the remote sandbox.\\n- Retrieve the public URL for the exposed service and save it to `/home/user/frontend-app/share_url.txt`.\\n\\n## Constraints\\n- Project path: `/home/user/frontend-app`\\n- Log file: `/home/user/frontend-app/share_url.txt`\\n- The sandbox must be named `multiplayer-box`.\\n- Use Amika CLI to create and manage the sandbox.\\n\\n## Integrations\\n- Amika Cloud\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_multiplayer_share__KErrh2W\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":true,\"latency_sec\":671.34,\"latency_breakdown\":{\"env_setup\":5.577,\"agent_setup\":18.37,\"agent_exec\":600.119,\"verifier\":5.547},\"taskName\":\"amika_multiplayer_share\",\"jobId\":\"KErrh2W\",\"exec_duration\":600.119}]},{\"taskName\":\"amika_sandbox_agent_send\",\"instruction\":\"# Amika Sandbox Agent Send\\n\\n## Background\\nYou have the Amika CLI installed and are authenticated. Amika allows you to send instructions directly to an agent CLI inside a persistent sandbox.\\n\\n## Requirements\\n- Create a remote sandbox named `agent-box` from the current directory.\\n- Send a prompt to the agent inside `agent-box` to create a file named `hello.txt` with the content `Hello, Amika!` in the current directory.\\n\\n## Constraints\\n- Project path: /home/user/project\\n- Use Amika CLI for all operations.\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_sandbox_agent_send__oBVrLDg\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":true,\"latency_sec\":681.351,\"latency_breakdown\":{\"env_setup\":19.056,\"agent_setup\":21.075,\"agent_exec\":600.122,\"verifier\":10.358},\"taskName\":\"amika_sandbox_agent_send\",\"jobId\":\"oBVrLDg\",\"exec_duration\":600.122}]},{\"taskName\":\"amika_sandbox_ssh\",\"instruction\":\"# Non-Interactive SSH Command Execution\\n\\n## Background\\nAmika allows executing commands non-interactively on a remote sandbox using `amika sandbox ssh`. This is useful for programmatic agent driving and automation.\\n\\n## Requirements\\n- Create a remote sandbox named `test-box` from the current git repository.\\n- Execute a non-interactive command on `test-box` using `amika sandbox ssh` to create a file at `/home/user/hello.txt` containing the exact text `Hello from SSH`.\\n- Save the standard output or log of your ssh command to `/home/user/project/output.log`.\\n\\n## Constraints\\n- Project path: /home/user/project\\n- Log file: /home/user/project/output.log\\n- You must use `amika sandbox create` and `amika sandbox ssh`.\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\"amika_sandbox_ssh__oVHRxEE\",\"model\":\"gemini-3-flash\",\"agent\":\"Pochi\",\"passed\":false,\"reward\":0,\"error\":true,\"latency_sec\":664.309,\"latency_breakdown\":{\"env_setup\":8.764,\"agent_setup\":18.583,\"agent_exec\":600.124,\"verifier\":5.897},\"taskName\":\"amika_sandbox_ssh\",\"jobId\":\"oVHRxEE\",\"exec_duration\":600.124}]},{\"taskName\":\"amika_secret_inject\",\"instruction\":\"# Inject Secrets into Amika Sandbox\\n\\n## Background\\nAmika allows you to securely store API keys in the cloud and inject them into persistent sandboxes for agents to use.\\n\\n## Requirements\\n- Push a mock Claude API key (`sk-ant-api03-mock-key`) into the Amika secret store as a `claude` secret of type `api_key`.\\n- Create a new remote sandbox named `secret-sandbox` from the current project directory and inject the `claude` secret into it.\\n- Use `amika sandbox ssh` to run a command inside the sandbox that outputs its environment variables, and save this output to `/home/user/project/env.txt`.\\n\\n## Constraints\\n- Project path: `/home/user/project`\\n- Log file: `/home/user/project/env.txt`\\n- Ensure the project is initialized as a git repository before creating the sandbox, as remote sandboxes require it.\",\"trials\":[{\"job_name\":\"2026-04-27__18-08-02\",\"trial_name\":\
